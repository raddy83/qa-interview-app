<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Quiz Result</title>
</head>
<body>

<h1>Quiz finished</h1>

<p>
  Your score:
  <strong th:text="${score}"></strong>
  /
  <strong th:text="${totalQuestions}"></strong>
</p>

<p>
  Percentage:
  <strong th:text="${#numbers.formatDecimal(percentage, 1, 2)}"></strong>%
</p>

<h2 th:text="${passed ? 'PASSED' : 'FAILED'}"></h2>

<p>Passing threshold: 75%</p>

<hr>

<h2>Review wrong answers</h2>

<div th:if="${#lists.isEmpty(wrongAnswers)}">
  <p>Great job! You answered all questions correctly.</p>
</div>

<div th:each="item : ${wrongAnswers}">
  <h3 th:text="${item.category}"></h3>

  <p>
    <strong>Question:</strong>
    <span th:text="${item.questionContent}"></span>
  </p>

  <p>
    <strong>Your answer:</strong>
    <span th:text="${item.selectedAnswerContent}"></span>
  </p>

  <p>
    <strong>Correct answer:</strong>
    <span th:text="${item.correctAnswerContent}"></span>
  </p>

  <p>
    <strong>Explanation:</strong>
    <span th:text="${item.explanation}"></span>
  </p>

  <hr>
</div>

<a href="/quiz/start">Try again</a>
<br>
<a href="/">Back to questions</a>

</body>
</html>
