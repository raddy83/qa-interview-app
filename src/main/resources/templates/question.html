<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Question</title>
</head>
<body>

<h2 th:text="${question.content}"></h2>

<form th:action="@{/questions/{id}/answer(id=${question.id})}" method="post">

  <div th:each="answer : ${question.answers}">
    <label>
      <input type="radio" name="answerId" th:value="${answer.id}" required>
      <span th:text="${answer.content}"></span>
    </label>
  </div>

  <br>

  <button type="submit">Check answer</button>
</form>

<br>

<a href="/">Back to questions</a>

</body>
</html>
